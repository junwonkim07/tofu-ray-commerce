name: Deploy to Vultr

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            cd ~/apps/tofu-ray-commerce

            # .env is server-local and should exist before deploy.
            if [ ! -f .env ]; then
              echo "ERROR: .env not found on server. Create ~/apps/tofu-ray-commerce/.env first."
              exit 1
            fi

            # If tracked files were edited on server, stash them to avoid pull failure.
            if ! git diff --quiet || ! git diff --cached --quiet; then
              echo "Tracked local changes detected on server. Stashing before deploy."
              git stash push -m "auto-stash-before-deploy-$(date +%s)" || true
            fi

            git pull --ff-only origin main
            docker compose up -d --remove-orphans
            docker compose ps
